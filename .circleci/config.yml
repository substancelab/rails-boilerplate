# Ruby CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-ruby/ for more details
#
version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build:
    docker:
      # https://circleci.com/developer/images/image/cimg/ruby
      - image: cimg/ruby:4.0.5-node
        environment:
        - DATABASE_URL=postgres://ubuntu:@localhost:5432/circle_test

    steps:
      - checkout

      - run:
          name: "Configure Node version"
          command: |
            grep node mise.toml | cut -d " " -f 3 | cut -d '"' -f 2 > .nvmrc

      - node/install:
          install-yarn: false

      # Download and cache dependencies
      - restore_cache:
          keys:
          - v2-dependencies-{{ checksum "Gemfile.lock" }}-{{ checksum "package-lock.json" }}
          # fallback to using the latest cache if no exact match is found
          - v2-dependencies-

      - run:
          name: Install dependencies
          command: |
            gem install bundler
            bundle update --bundler
            bundle config set path './vendor/bundle'
            bundle install --jobs=4 --retry=3
            bundle clean --force
            npm install

      - save_cache:
          paths:
            - ./vendor/bundle
            - ./node_modules
          key: v2-dependencies-{{ checksum "Gemfile.lock" }}-{{ checksum "package-lock.json" }}

      # Database setup
      - run:
          name: Setup database
          command: |
            bin/boilerplate/ci/setup

      # run tests!
      - run:
          name: Run tests
          command: |
            mkdir /tmp/test-results
            bin/boilerplate/ci/build

      # collect reports
      - store_test_results:
          path: /tmp/test-results
      - store_artifacts:
          path: /tmp/test-results
          destination: test-results
